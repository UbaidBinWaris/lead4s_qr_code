.card{width:100%;max-width:400px;background:#111;border-radius:28px;overflow:hidden;border:1px solid #222}

.info-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.1em;font-weight:500;width:60px;flex-shrink:0}
.info-val{color:#ddd;font-size:13px;font-weight:400}

.section-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:0.14em;font-weight:600;padding:14px 20px 8px}

.link-row:hover{background:#161616}
.link-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.link-icon svg{width:18px;height:18px}
.link-text{flex:1}
.link-name{font-size:13px;font-weight:600;color:#e8e8e8;margin-bottom:1px}
.link-sub{font-size:11px;color:#555;font-weight:400}
.link-arrow{color:#333;font-size:16px}

.ic-ig{background:#4a1535}

.website-row{display:flex;align-items:center;gap:14px;padding:15px 20px;text-decoration:none;background:#191208;transition:background 0.15s}

.website-sub{font-size:11px;color:#8a6e28}
.website-arrow{color:#c9a84c;font-size:14px;opacity:0.7}

.card-footer{padding:12px 20px;text-align:center;background:#0d0d0d}
